<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Voice Call — Live Transcript</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        margin: 0; background: #0b0d12; color: #e7e9ee;
      }
      header {
        padding: 16px 20px; border-bottom: 1px solid #1d2230;
        display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      }
      h1 { font-size: 16px; margin: 0; font-weight: 600; }
      .badge {
        font-size: 12px; padding: 3px 10px; border-radius: 999px;
        background: #1d2230; color: #9aa4b2; text-transform: uppercase; letter-spacing: .04em;
      }
      .badge.in_progress { background: #16331f; color: #57d98a; }
      .badge.completed { background: #16263a; color: #5aa9ff; }
      .badge.failed, .badge.no_answer { background: #3a1620; color: #ff6b8a; }
      main { max-width: 760px; margin: 0 auto; padding: 20px; }
      .meta { color: #9aa4b2; font-size: 13px; margin-bottom: 16px; }
      .turns { display: flex; flex-direction: column; gap: 10px; }
      .turn { display: flex; }
      .turn.agent { justify-content: flex-start; }
      .turn.customer { justify-content: flex-end; }
      .bubble {
        max-width: 78%; padding: 10px 14px; border-radius: 14px; line-height: 1.4;
        font-size: 14px; white-space: pre-wrap; word-wrap: break-word;
      }
      .turn.agent .bubble { background: #182030; border-top-left-radius: 4px; }
      .turn.customer .bubble { background: #243b2a; border-top-right-radius: 4px; }
      .who { font-size: 11px; color: #9aa4b2; margin-bottom: 3px; }
      .tool { text-align: center; color: #c9a14a; font-size: 12px; margin: 6px 0; }
      .summary {
        margin-top: 22px; padding: 16px; border: 1px solid #1d2230; border-radius: 12px;
        background: #11151f;
      }
      .summary h2 { font-size: 13px; margin: 0 0 8px; color: #9aa4b2; text-transform: uppercase; }
      audio { width: 100%; margin-top: 12px; }
      .empty { color: #6b7280; font-style: italic; }
    </style>
  </head>
  <body>
    <header>
      <h1 id="title">Call</h1>
      <span id="status" class="badge">connecting…</span>
      <span id="disposition" class="badge" hidden></span>
    </header>
    <main>
      <div class="meta" id="meta"></div>
      <div class="turns" id="turns"><div class="empty" id="empty">Waiting for the call to start…</div></div>
      <div class="summary" id="summaryBox" hidden>
        <h2>Summary</h2>
        <div id="summary"></div>
        <h2 style="margin-top:12px">Next action</h2>
        <div id="nextAction"></div>
        <audio id="audio" controls hidden></audio>
      </div>
    </main>

    <script>
      const params = new URLSearchParams(location.search);
      const callId = params.get("id");
      const $ = (id) => document.getElementById(id);

      if (!callId) {
        $("turns").innerHTML = '<div class="empty">Add ?id=&lt;callId&gt; to the URL.</div>';
      } else {
        bootstrap();
      }

      async function bootstrap() {
        // Load static call info (account, numbers, recording if present).
        try {
          const r = await fetch(`/calls/${callId}`);
          if (r.ok) {
            const { call } = await r.json();
            $("title").textContent = `${call.account_name ?? "Account"} — ${call.contact_name ?? ""}`;
            $("meta").textContent =
              `${call.to_number ?? ""} · goal: ${call.goal ?? "—"}`;
            if (call.recording_url) {
              const a = $("audio"); a.src = call.recording_url; a.hidden = false;
            }
          }
        } catch {}

        const seen = new Set();
        const es = new EventSource(`/calls/${callId}/stream`);

        es.addEventListener("status", (e) => setStatus(JSON.parse(e.data).status));
        es.addEventListener("segment", (e) => addSegment(JSON.parse(e.data), seen));
        es.addEventListener("tool", (e) => addTool(JSON.parse(e.data)));
        es.addEventListener("ended", (e) => showSummary(JSON.parse(e.data)));
        es.onerror = () => setStatus(document.getElementById("status").dataset.s || "disconnected");
      }

      function setStatus(s) {
        const el = $("status");
        el.textContent = (s || "").replace(/_/g, " ");
        el.className = "badge " + (s || "");
        el.dataset.s = s;
      }

      function addSegment(seg, seen) {
        if (seg.id && seen.has(seg.id)) return;
        if (seg.id) seen.add(seg.id);
        if (seg.speaker === "system") return;
        $("empty")?.remove();
        const wrap = document.createElement("div");
        wrap.className = "turn " + seg.speaker;
        wrap.innerHTML =
          `<div><div class="who">${seg.speaker === "agent" ? "Agent" : "Customer"}</div>` +
          `<div class="bubble"></div></div>`;
        wrap.querySelector(".bubble").textContent = seg.text;
        $("turns").appendChild(wrap);
        window.scrollTo(0, document.body.scrollHeight);
      }

      function addTool(t) {
        $("empty")?.remove();
        const el = document.createElement("div");
        el.className = "tool";
        el.textContent = `⚙︎ ${t.tool}(${JSON.stringify(t.args)})`;
        $("turns").appendChild(el);
      }

      function showSummary(d) {
        setStatus(d.status);
        if (d.disposition) {
          const el = $("disposition");
          el.hidden = false;
          el.textContent = d.disposition.replace(/_/g, " ");
        }
        $("summaryBox").hidden = false;
        $("summary").textContent = d.summary || "—";
        $("nextAction").textContent = d.nextAction || "—";
      }
    </script>
  </body>
</html>

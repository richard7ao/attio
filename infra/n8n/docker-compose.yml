services:
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - '5678:5678'
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-UTC}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # Webhooks call back into the Attio API:
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://host.docker.internal:3001}
    volumes:
      - ./.n8n:/home/node/.n8n
      - ./workflows:/workflows
